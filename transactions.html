<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financials | Muggun Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8"> 
    <!-- Secure, CSP-Friendly PDF Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">MUGGUN BOUTIQUE</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Dashboard</a>
            <a href="masters.html" class="nav-btn">Master Data</a>
            <a href="production.html" class="nav-btn">Production</a>
            <a href="transactions.html" class="nav-btn active">Financials</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">Expense & Payout Management</h2>
        
        <div class="split-grid" style="grid-template-columns: 1fr 1fr; gap: 30px;">
            
            <!-- 1. MATERIAL PURCHASES -->
            <div class="card">
                <h2>Log Material Purchase</h2>
                <div class="form-group"><label>Date</label><input type="date" id="pur-date"></div>
                <div class="form-group"><label>Supplier Name</label><input type="text" id="pur-supplier" placeholder="E.g., ABC Fabrics"></div>
                <div class="form-group">
                    <label>Material Type</label>
                    <select id="pur-type">
                        <option value="Fabric">Fabric</option>
                        <option value="Thread">Thread</option>
                        <option value="Buttons/Zips">Buttons / Zips</option>
                        <option value="Packaging">Packaging</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Qty</label><input type="number" id="pur-qty" placeholder="0"></div>
                    <div class="form-group" style="flex: 1;"><label>Rate (₹)</label><input type="number" id="pur-rate" placeholder="0.00"></div>
                </div>
                <button onclick="savePurchase()">Record Purchase</button>
            </div>

            <!-- 2. SHOP EXPENSES -->
            <div class="card">
                <h2>Log Shop Expense</h2>
                <div class="form-group"><label>Date</label><input type="date" id="exp-date"></div>
                <div class="form-group">
                    <label>Expense Head</label>
                    <select id="exp-head">
                        <option value="EXP-RENT">Rent</option>
                        <option value="EXP-ELEC">Electricity</option>
                        <option value="EXP-TEA">Tea</option>
                        <option value="EXP-SNACKS">Snacks</option>
                        <option value="EXP-WATER">Water</option>
                        <option value="EXP-MISC">Miscellaneous</option>
                    </select>
                </div>
                <div class="form-group"><label>Description / Note</label><input type="text" id="exp-desc" placeholder="E.g., April Bill"></div>
                <div class="form-group"><label>Amount (₹)</label><input type="number" id="exp-amount" placeholder="0.00"></div>
                <button onclick="saveExpense()">Record Expense</button>
            </div>

            <!-- 3. WORKER PAYMENT (Piece Rate) -->
            <div class="card">
                <h2>Worker Payment (Piece Rate)</h2>
                <div class="form-group"><label>Date Paid</label><input type="date" id="wp-date"></div>
                <div class="form-group">
                    <label>Select Worker</label>
                    <select id="wp-worker"><option>Loading...</option></select>
                </div>
                <div class="form-group">
                    <label>Article Completed</label>
                    <select id="wp-article"><option>Loading...</option></select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Qty Completed</label><input type="number" id="wp-qty" placeholder="0"></div>
                    <div class="form-group" style="flex: 1;"><label>Rate/Piece (₹)</label><input type="number" id="wp-rate" placeholder="0.00"></div>
                </div>
                <button onclick="saveWorkerPayment()">Log Worker Payout</button>
            </div>

            <!-- 4. STAFF SALARY -->
            <div class="card">
                <h2>Staff Salary Payout</h2>
                <div class="form-group"><label>Date Paid</label><input type="date" id="ss-date"></div>
                <div class="form-group"><label>Staff Name</label><input type="text" id="ss-name" placeholder="E.g., Manager"></div>
                <div class="form-group"><label>Salary Month</label><input type="month" id="ss-month"></div>
                <div class="form-group"><label>Amount Paid (₹)</label><input type="number" id="ss-amount" placeholder="0.00"></div>
                <button onclick="saveStaffSalary()">Log Salary Payout</button>
            </div>
            <!-- 5. SALES INVOICE (Step 8) -->
            <div class="card">
                <h2>Log Sales Invoice (Delivery)</h2>
                <div class="form-group"><label>Date</label><input type="date" id="inv-date"></div>
                <div class="form-group"><label>Invoice No.</label><input type="text" id="inv-no" placeholder="E.g., INV-001"></div>
                <div class="form-group"><label>Linked Order No.</label><input type="text" id="inv-so" placeholder="E.g., SO-1001"></div>
                <div class="form-group"><label>Article Code</label><select id="inv-article"><option>Loading...</option></select></div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Qty Delivered</label><input type="number" id="inv-qty" placeholder="0"></div>
                    <div class="form-group" style="flex: 1;"><label>Rate (₹)</label><input type="number" id="inv-rate" placeholder="0.00"></div>
                </div>
                <button onclick="saveInvoice()">Record Invoice</button>
            </div>

            <!-- 6. PAYMENT RECEIPT (Step 9) -->
            <div class="card">
                <h2>Payment Receipt</h2>
                <div class="form-group"><label>Date</label><input type="date" id="rec-date"></div>
                <div class="form-group"><label>Client</label><select id="rec-client"><option>Loading...</option></select></div>
                <div class="form-group"><label>Linked Invoice No.</label><input type="text" id="rec-inv" placeholder="E.g., INV-001"></div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Amount Received</label><input type="number" id="rec-amount" placeholder="0.00"></div>
                    <div class="form-group" style="flex: 1;">
                        <label>Mode</label>
                        <select id="rec-mode"><option>Bank Transfer</option><option>UPI</option><option>Cash</option></select>
                    </div>
                </div>
                <button onclick="saveReceipt()">Log Payment</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // PASTE YOUR FIREBASE CONFIG HERE!
        const firebaseConfig = {
            apiKey: "AIzaSyDDAg0bLMj4hUsZ5PGGDqKyj5KwAQmMcNw",
            authDomain: "boutique-app-d2693.firebaseapp.com",
            projectId: "boutique-app-d2693",
            storageBucket: "boutique-app-d2693.firebasestorage.app",
            messagingSenderId: "762532423429",
            appId: "1:762532423429:web:0b849c205deb831f71796c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auto-fill today's dates
        const today = new Date().toISOString().slice(0, 10);
        document.querySelectorAll('input[type="date"]').forEach(el => el.value = today);
        document.getElementById('ss-month').value = today.slice(0, 7);
        document.getElementById('inv-date').value = today;
        document.getElementById('rec-date').value = today;

        // --- PULL MASTERS FOR DROPDOWNS ---
        onSnapshot(collection(db, "master_workers"), (snap) => {
            let opts = '<option value="">-- Select Worker --</option>';
            snap.docs.forEach(doc => { const w = doc.data(); opts += `<option value="${w.name}">${w.name} - ${w.type}</option>`; });
            document.getElementById('wp-worker').innerHTML = opts;
        });

        onSnapshot(collection(db, "master_articles"), (snap) => {
            let opts = '<option value="">-- Select Article --</option>';
            snap.docs.forEach(doc => { const a = doc.data(); opts += `<option value="${a.code}">${a.name} [${a.code}]</option>`; });
            
            // Fills the Worker Payment dropdown
            document.getElementById('wp-article').innerHTML = opts; 
            
            // ADD THIS LINE: Fills the Sales Invoice dropdown
            document.getElementById('inv-article').innerHTML = opts; 
        });

        onSnapshot(collection(db, "master_clients"), (snap) => {
            let opts = '<option value="">-- Select Client --</option>';
            snap.docs.forEach(doc => { const c = doc.data(); opts += `<option value="${c.name}">${c.name}</option>`; });
            document.getElementById('rec-client').innerHTML = opts;
        });
        // Note: You can reuse the existing 'wp-article' snapshot to also fill 'inv-article' by adding:
        // document.getElementById('inv-article').innerHTML = opts; inside the master_articles snapshot.

        window.saveInvoice = async function() {
            const date = document.getElementById('inv-date').value;
            const invoiceNo = document.getElementById('inv-no').value;
            const linkedSO = document.getElementById('inv-so').value;
            const article = document.getElementById('inv-article').value;
            const qty = parseInt(document.getElementById('inv-qty').value);
            const rate = parseFloat(document.getElementById('inv-rate').value);
            
            if (!invoiceNo || isNaN(qty) || isNaN(rate)) return alert("Fill required invoice fields.");
            
            const totalAmount = qty * rate;
            const formatMoney = (amt) => '₹' + amt.toLocaleString('en-IN', {minimumFractionDigits: 2});

            // 1. Save to Database
            await addDoc(collection(db, "erp_invoices"), { date, invoiceNo, linkedSO, article, qty, rate, total: totalAmount });
            
            // 2. Secure Native PDF Generation
            if(confirm("Invoice Saved! Download official PDF Receipt?")) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFontSize(22);
                doc.text("MUGGUN BOUTIQUE", 105, 20, { align: "center" });
                doc.setFontSize(12);
                doc.setTextColor(100);
                doc.text("Tax Invoice / Bill of Supply", 105, 28, { align: "center" });

                // Meta Data
                doc.setTextColor(0);
                doc.setFontSize(10);
                doc.text(`Invoice No: ${invoiceNo}`, 14, 45);
                doc.text(`Date: ${new Date(date).toLocaleDateString('en-IN')}`, 14, 52);
                doc.text(`Linked Order: ${linkedSO || 'N/A'}`, 196, 45, { align: "right" });

                // The Items Table
                doc.autoTable({
                    startY: 60,
                    head: [['Article Code', 'Quantity', 'Rate', 'Total']],
                    body: [
                        [article, `${qty} Units`, formatMoney(rate), formatMoney(totalAmount)]
                    ],
                    theme: 'striped',
                    headStyles: { fillColor: [46, 125, 50] }, // A nice dark green header
                    foot: [['', '', 'Grand Total', formatMoney(totalAmount)]],
                    footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' }
                });

                // Footer Signature
                const finalY = doc.lastAutoTable.finalY || 80;
                doc.text("_________________________", 196, finalY + 40, { align: "right" });
                doc.text("Authorized Signatory", 196, finalY + 47, { align: "right" });

                // Download
                doc.save(`${invoiceNo}_Muggun_Boutique.pdf`);
            }

            // 3. Clear the form
            document.querySelectorAll('#inv-no, #inv-so, #inv-qty, #inv-rate').forEach(el => el.value = '');
        };

        window.saveReceipt = async function() {
            const date = document.getElementById('rec-date').value;
            const client = document.getElementById('rec-client').value;
            const invoiceNo = document.getElementById('rec-inv').value || 'Advance / Unlinked';
            const amount = parseFloat(document.getElementById('rec-amount').value);
            const mode = document.getElementById('rec-mode').value;
            
            if (!client || isNaN(amount)) return alert("Fill required receipt fields.");
            
            const formatMoney = (amt) => '₹' + amt.toLocaleString('en-IN', {minimumFractionDigits: 2});

            // 1. Save to Database
            await addDoc(collection(db, "erp_receipts"), { date, client, invoiceNo, amount, mode });
            
            // 2. Secure Native PDF Generation
            if(confirm("Payment Logged! Download official PDF Receipt?")) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Header
                doc.setFontSize(22);
                doc.text("MUGGUN BOUTIQUE", 105, 20, { align: "center" });
                doc.setFontSize(12);
                doc.setTextColor(100);
                doc.text("Payment Receipt", 105, 28, { align: "center" });

                // Meta Data
                doc.setTextColor(0);
                doc.setFontSize(10);
                doc.text(`Date: ${new Date(date).toLocaleDateString('en-IN')}`, 14, 45);
                doc.text(`Mode: ${mode}`, 14, 52);
                doc.text(`Linked Invoice: ${invoiceNo}`, 196, 45, { align: "right" });

                // Main Content Table
                doc.autoTable({
                    startY: 60,
                    head: [['Received From', 'Amount']],
                    body: [
                        [client, formatMoney(amount)]
                    ],
                    theme: 'grid',
                    headStyles: { fillColor: [46, 125, 50] }, // Dark green header
                    bodyStyles: { fontSize: 14, fontStyle: 'bold', minCellHeight: 20, valign: 'middle' },
                    columnStyles: { 1: { halign: 'right' } }
                });

                // Thank you note
                const finalY = doc.lastAutoTable.finalY || 80;
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.setFont("helvetica", "italic");
                doc.text("Thank you for your business!", 105, finalY + 15, { align: "center" });

                // Footer Signatures
                doc.setTextColor(0);
                doc.setFont("helvetica", "normal");
                
                doc.text("_________________________", 14, finalY + 50);
                doc.text("Customer Signature", 14, finalY + 57);

                doc.text("_________________________", 196, finalY + 50, { align: "right" });
                doc.text("Authorized Signatory", 196, finalY + 57, { align: "right" });

                // Download
                doc.save(`Receipt_${client.replace(/\s+/g, '_')}_${date}.pdf`);
            }

            // 3. Clear the form
            document.querySelectorAll('#rec-inv, #rec-amount').forEach(el => el.value = '');
        };

        // --- SAVE FUNCTIONS ---
        window.savePurchase = async function() {
            const date = document.getElementById('pur-date').value;
            const supplier = document.getElementById('pur-supplier').value;
            const type = document.getElementById('pur-type').value;
            const qty = parseFloat(document.getElementById('pur-qty').value);
            const rate = parseFloat(document.getElementById('pur-rate').value);
            if (!supplier || isNaN(qty) || isNaN(rate)) return alert("Fill all purchase fields.");
            await addDoc(collection(db, "erp_purchases"), { date, supplier, type, qty, rate, total: qty * rate });
            alert("Purchase Logged!");
            document.getElementById('pur-supplier').value = ''; document.getElementById('pur-qty').value = ''; document.getElementById('pur-rate').value = '';
        };

        window.saveExpense = async function() {
            const date = document.getElementById('exp-date').value;
            const head = document.getElementById('exp-head').value;
            const desc = document.getElementById('exp-desc').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            if (!desc || isNaN(amount)) return alert("Fill all expense fields.");
            await addDoc(collection(db, "erp_expenses"), { date, head, desc, amount });
            alert("Expense Logged!");
            document.getElementById('exp-desc').value = ''; document.getElementById('exp-amount').value = '';
        };

        window.saveWorkerPayment = async function() {
            const date = document.getElementById('wp-date').value;
            const worker = document.getElementById('wp-worker').value;
            const article = document.getElementById('wp-article').value;
            const qty = parseInt(document.getElementById('wp-qty').value);
            const rate = parseFloat(document.getElementById('wp-rate').value);
            if (!worker || !article || isNaN(qty) || isNaN(rate)) return alert("Fill all worker payment fields.");
            await addDoc(collection(db, "erp_worker_payments"), { date, worker, article, qty, rate, total: qty * rate });
            alert("Worker Payment Logged!");
            document.getElementById('wp-qty').value = ''; document.getElementById('wp-rate').value = '';
        };

        window.saveStaffSalary = async function() {
            const date = document.getElementById('ss-date').value;
            const name = document.getElementById('ss-name').value;
            const month = document.getElementById('ss-month').value;
            const amount = parseFloat(document.getElementById('ss-amount').value);
            if (!name || !month || isNaN(amount)) return alert("Fill all salary fields.");
            await addDoc(collection(db, "erp_staff_salaries"), { date, name, month, amount });
            alert("Salary Logged!");
            document.getElementById('ss-name').value = ''; document.getElementById('ss-amount').value = '';
        };
    </script>
</body>
</html>
