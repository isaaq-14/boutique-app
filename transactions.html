<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | Lumière Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3"> 
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">LUMIÈRE</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Dashboard</a>
            <a href="transactions.html" class="nav-btn active">Transactions</a>
            <a href="payroll.html" class="nav-btn">Payroll</a>
        </div>
    </nav>

    <div class="container">
        <div class="controls-header no-print">
            <div class="month-selector">
                <label for="view-month" style="margin: 0;">Viewing Month:</label>
                <input type="month" id="view-month" onchange="renderApp()">
            </div>
            <button class="btn-export" onclick="window.print()">Export Report</button>
        </div>

        <h2 class="page-title">Income & Expenses</h2>
        <div class="split-grid">
            <div class="no-print">
                <div class="card">
                    <h2 id="t-form-title">Log Transaction</h2>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="t-date">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="t-desc" placeholder="E.g., Silk Fabric, Customer Sale">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="t-category">
                            <optgroup label="Income">
                                <option value="Boutique Sale">Boutique Sale</option>
                                <option value="Other Income">Other Income</option>
                            </optgroup>
                            <optgroup label="Shop Running Costs">
                                <option value="Rent">Rent</option>
                                <option value="Electricity">Electricity</option>
                                <option value="Daily Expenses">Daily Expenses</option>
                            </optgroup>
                            <optgroup label="Operations">
                                <option value="Materials">Materials & Inventory</option>
                                <option value="Miscellaneous">Miscellaneous</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="t-amount" placeholder="0.00">
                    </div>
                    <div class="btn-group">
                        <button id="btn-save-transaction" onclick="saveTransaction()">Record Transaction</button>
                        <button id="btn-cancel-transaction" class="btn-secondary" style="display: none;" onclick="cancelEditTransaction()">Cancel</button>
                    </div>
                </div>
            </div>
            <div>
                <div class="card">
                    <h2>Transaction History</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th class="action-cell no-print">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDAg0bLMj4hUsZ5PGGDqKyj5KwAQmMcNw",
            authDomain: "boutique-app-d2693.firebaseapp.com",
            projectId: "boutique-app-d2693",
            storageBucket: "boutique-app-d2693.firebasestorage.app",
            messagingSenderId: "762532423429",
            appId: "1:762532423429:web:0b849c205deb831f71796c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transactionsRef = collection(db, "transactions");

        let transactions = [];
        let editingTransactionId = null;

        const formatMoney = (amount) => '₹' + amount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

        const today = new Date();
        document.getElementById('view-month').value = today.toISOString().slice(0, 7);
        document.getElementById('t-date').value = today.toISOString().slice(0, 10);

        window.renderApp = function() {
            const selectedMonth = document.getElementById('view-month').value;
            const monthTransactions = transactions.filter(t => t.date.startsWith(selectedMonth));

            const tTable = document.getElementById('transaction-list');
            tTable.innerHTML = '';
            if(monthTransactions.length === 0) {
                tTable.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions logged for this month.</td></tr>';
            } else {
                monthTransactions.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                    const isIncome = t.category === 'Boutique Sale' || t.category === 'Other Income';
                    tTable.innerHTML += `
                        <tr>
                            <td>${formatDate(t.date)}</td>
                            <td>${t.desc}</td>
                            <td style="color: #666;">${t.category}</td>
                            <td class="${isIncome ? 'amount-pos' : 'amount-neg'}">${isIncome ? '+' : '-'}${formatMoney(t.amount)}</td>
                            <td class="action-cell no-print">
                                <button class="action-link" onclick="editTransaction('${t.id}')">Edit</button>
                                <button class="action-link danger" onclick="deleteTransaction('${t.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            }
        };

        onSnapshot(transactionsRef, (snapshot) => {
            transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.renderApp();
        });

        window.saveTransaction = async function() {
            const date = document.getElementById('t-date').value;
            const desc = document.getElementById('t-desc').value;
            const category = document.getElementById('t-category').value;
            const amount = parseFloat(document.getElementById('t-amount').value);
            
            if (!date || !desc || isNaN(amount)) return alert("Please fill out all fields.");
            
            if (editingTransactionId) {
                await updateDoc(doc(db, "transactions", editingTransactionId), { date, desc, category, amount });
                window.cancelEditTransaction(); 
            } else {
                await addDoc(transactionsRef, { date, desc, category, amount });
                document.getElementById('t-desc').value = '';
                document.getElementById('t-amount').value = '';
            }
        };

        window.editTransaction = function(id) {
            const t = transactions.find(x => x.id === id);
            if(!t) return;
            document.getElementById('t-date').value = t.date;
            document.getElementById('t-desc').value = t.desc;
            document.getElementById('t-category').value = t.category;
            document.getElementById('t-amount').value = t.amount;
            editingTransactionId = id;
            document.getElementById('t-form-title').innerText = "Update Transaction";
            document.getElementById('btn-save-transaction').innerText = "Update";
            document.getElementById('btn-cancel-transaction').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEditTransaction = function() {
            editingTransactionId = null;
            document.getElementById('t-desc').value = '';
            document.getElementById('t-amount').value = '';
            document.getElementById('t-form-title').innerText = "Log Transaction";
            document.getElementById('btn-save-transaction').innerText = "Record Transaction";
            document.getElementById('btn-cancel-transaction').style.display = "none";
        };

        window.deleteTransaction = async function(id) {
            if(confirm("Delete this transaction?")) await deleteDoc(doc(db, "transactions", id));
        };
    </script>
</body>
</html>
