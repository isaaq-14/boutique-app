<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production | Muggun Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7"> 
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">MUGGUN BOUTIQUE</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Dashboard</a>
            <a href="masters.html" class="nav-btn">Master Data</a>
            <a href="production.html" class="nav-btn active">Production</a>
            <a href="transactions.html" class="nav-btn">Financials</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">Factory Floor & Orders</h2>
        
        <!-- STEP 1: SALES ORDERS -->
        <div class="split-grid" style="margin-bottom: 50px;">
            <div>
                <div class="card">
                    <h2>1. Log Sales Order</h2>
                    <div class="form-group"><label>Date</label><input type="date" id="so-date"></div>
                    <div class="form-group"><label>Order No.</label><input type="text" id="so-no" placeholder="e.g., SO-1001"></div>
                    <div class="form-group">
                        <label>Select Client</label>
                        <select id="so-client"><option>Loading...</option></select>
                    </div>
                    <div class="form-group">
                        <label>Select Article</label>
                        <select id="so-article"><option>Loading...</option></select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><label>Quantity</label><input type="number" id="so-qty" placeholder="0"></div>
                        <div class="form-group" style="flex: 1;"><label>Agreed Rate (₹)</label><input type="number" id="so-rate" placeholder="0.00"></div>
                    </div>
                    <button onclick="saveSalesOrder()">Create Sales Order</button>
                </div>
            </div>
            <div>
                <div class="card">
                    <h2>Active Sales Orders</h2>
                    <table>
                        <thead><tr><th>Order No.</th><th>Client</th><th>Article</th><th>Qty</th><th>Total Value</th></tr></thead>
                        <tbody id="so-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- STEP 2: PRODUCTION JOB WORK -->
        <div class="split-grid">
            <div>
                <div class="card">
                    <h2>2. Assign Job Work</h2>
                    <div class="form-group"><label>Date</label><input type="date" id="po-date"></div>
                    <div class="form-group">
                        <label>Link to Sales Order (Optional)</label>
                        <select id="po-link"><option value="None">Stock / No Order</option></select>
                    </div>
                    <div class="form-group">
                        <label>Article to Produce</label>
                        <select id="po-article"><option>Loading...</option></select>
                    </div>
                    <div class="form-group">
                        <label>Assign Worker</label>
                        <select id="po-worker"><option>Loading...</option></select>
                    </div>
                    <div class="form-group"><label>Quantity Planned</label><input type="number" id="po-qty" placeholder="0"></div>
                    <button onclick="saveProductionOrder()">Dispatch to Floor</button>
                </div>
            </div>
            <div>
                <div class="card">
                    <h2>Factory Floor Status</h2>
                    <table>
                        <thead><tr><th>Date</th><th>Worker</th><th>Article</th><th>Target Qty</th></tr></thead>
                        <tbody id="po-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDDAg0bLMj4hUsZ5PGGDqKyj5KwAQmMcNw",
            authDomain: "boutique-app-d2693.firebaseapp.com",
            projectId: "boutique-app-d2693",
            storageBucket: "boutique-app-d2693.firebasestorage.app",
            messagingSenderId: "762532423429",
            appId: "1:762532423429:web:0b849c205deb831f71796c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auto-fill today's date
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('so-date').value = today;
        document.getElementById('po-date').value = today;

        const formatMoney = (amount) => '₹' + amount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // --- 1. RELATIONAL DATABASE PULLS (Populating Dropdowns) ---
       // --- 1. RELATIONAL DATABASE PULLS (Populating Dropdowns) ---
        onSnapshot(collection(db, "master_clients"), (snap) => {
            let opts = '<option value="">-- Select Client --</option>';
            snap.docs.forEach(doc => { const c = doc.data(); opts += `<option value="${c.name}">${c.name}</option>`; });
            document.getElementById('so-client').innerHTML = opts;
        });

        onSnapshot(collection(db, "master_articles"), (snap) => {
            let opts = '<option value="">-- Select Article --</option>';
            snap.docs.forEach(doc => { const a = doc.data(); opts += `<option value="${a.code}">${a.name} [${a.code}]</option>`; });
            document.getElementById('so-article').innerHTML = opts;
            document.getElementById('po-article').innerHTML = opts;
        });

        onSnapshot(collection(db, "master_workers"), (snap) => {
            let opts = '<option value="">-- Select Worker --</option>';
            snap.docs.forEach(doc => { const w = doc.data(); opts += `<option value="${w.name}">${w.name} - ${w.type}</option>`; });
            document.getElementById('po-worker').innerHTML = opts;
        });
        // --- 2. SALES ORDERS ---
        onSnapshot(query(collection(db, "sales_orders"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('so-list');
            const linkDrop = document.getElementById('po-link');
            list.innerHTML = '';
            let linkOpts = '<option value="None">Stock / No Linked Order</option>';
            
            snap.docs.forEach(doc => {
                const so = doc.data();
                const total = so.qty * so.rate;
                list.innerHTML += `<tr><td><strong>${so.orderNo}</strong></td><td>${so.client}</td><td>${so.article}</td><td>${so.qty}</td><td class="amount-pos">${formatMoney(total)}</td></tr>`;
                linkOpts += `<option value="${so.orderNo}">${so.orderNo} - ${so.client}</option>`;
            });
            linkDrop.innerHTML = linkOpts;
        });

        window.saveSalesOrder = async function() {
            const date = document.getElementById('so-date').value;
            const orderNo = document.getElementById('so-no').value;
            const client = document.getElementById('so-client').value;
            const article = document.getElementById('so-article').value;
            const qty = parseInt(document.getElementById('so-qty').value);
            const rate = parseFloat(document.getElementById('so-rate').value);

            if (!orderNo || !client || !article || isNaN(qty) || isNaN(rate)) return alert("Please fill out all Sales Order fields.");

            await addDoc(collection(db, "sales_orders"), { date, orderNo, client, article, qty, rate, status: 'Pending' });
            document.getElementById('so-no').value = ''; document.getElementById('so-qty').value = ''; document.getElementById('so-rate').value = '';
        };

        // --- 3. PRODUCTION JOB WORK ---
        onSnapshot(query(collection(db, "production_orders"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('po-list');
            list.innerHTML = '';
            snap.docs.forEach(doc => {
                const po = doc.data();
                list.innerHTML += `<tr><td>${new Date(po.date).toLocaleDateString('en-IN', {day:'numeric', month:'short'})}</td><td><strong>${po.worker}</strong></td><td>${po.article}<br><small style="color:#888;">For: ${po.linkedSO}</small></td><td>${po.qty} units</td></tr>`;
            });
        });

        window.saveProductionOrder = async function() {
            const date = document.getElementById('po-date').value;
            const linkedSO = document.getElementById('po-link').value;
            const article = document.getElementById('po-article').value;
            const worker = document.getElementById('po-worker').value;
            const qty = parseInt(document.getElementById('po-qty').value);

            if (!article || !worker || isNaN(qty)) return alert("Please fill out all Production fields.");

            await addDoc(collection(db, "production_orders"), { date, linkedSO, article, worker, qty, status: 'In Progress' });
            document.getElementById('po-qty').value = '';
        };
    </script>
</body>
</html>
