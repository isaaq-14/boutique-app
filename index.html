<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Lumière Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">LUMIÈRE</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active">Dashboard</a>
            <a href="transactions.html" class="nav-btn">Transactions</a>
            <a href="payroll.html" class="nav-btn">Payroll</a>
        </div>
    </nav>

    <div class="container">
        <div class="controls-header no-print">
            <div class="month-selector">
                <label for="view-month" style="margin: 0;">Viewing Month:</label>
                <input type="month" id="view-month" onchange="renderApp()">
            </div>
            <button class="btn-export" onclick="downloadPDF()">Download .PDF Report</button>
        </div>

        <h2 class="page-title">Financial Overview</h2>
        <div class="dashboard-grid">
            <div class="card stat-card">
                <h3>Monthly Revenue</h3>
                <p class="amount-pos" id="total-income">₹0.00</p>
            </div>
            <div class="card stat-card">
                <h3>Monthly Expenses</h3>
                <p class="amount-neg" id="total-expenses">₹0.00</p>
            </div>
            <div class="card stat-card">
                <h3>Net Monthly Profit</h3>
                <p id="net-balance">₹0.00</p>
            </div>
        </div>
        <div class="card">
            <h2>Quick Summary</h2>
            <p style="color: #666;">This dashboard pulls live data from your secure cloud database. Navigate to the Transactions or Payroll tabs to log new entries.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDAg0bLMj4hUsZ5PGGDqKyj5KwAQmMcNw",
            authDomain: "boutique-app-d2693.firebaseapp.com",
            projectId: "boutique-app-d2693",
            storageBucket: "boutique-app-d2693.firebasestorage.app",
            messagingSenderId: "762532423429",
            appId: "1:762532423429:web:0b849c205deb831f71796c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let transactions = [];
        let salaries = [];

        const formatMoney = (amount) => '₹' + amount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        const today = new Date();
        document.getElementById('view-month').value = today.toISOString().slice(0, 7);
        // --- PDF EXPORT ENGINE ---
        window.downloadPDF = function() {
            // 1. Grab the elements we want to hide from the PDF
            const controls = document.querySelector('.controls-header');
            const actionCells = document.querySelectorAll('.action-cell');
            
            // 2. Temporarily hide them
            if(controls) controls.style.display = 'none';
            actionCells.forEach(cell => cell.style.display = 'none');

            // 3. Select the area of the page we want to turn into a PDF
            const element = document.querySelector('.container');
            const currentMonth = document.getElementById('view-month').value;

            // 4. Set the PDF quality and formatting rules
            const opt = {
                margin:       0.5,
                filename:     `Lumiere_Financial_Report_${currentMonth}.pdf`,
                image:        { type: 'jpeg', quality: 1 }, // Max quality
                html2canvas:  { scale: 2, useCORS: true },  // High resolution
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // 5. Generate and download the PDF!
            html2pdf().set(opt).from(element).save().then(() => {
                // 6. Put the buttons back on the screen after the download finishes
                if(controls) controls.style.display = 'flex';
                actionCells.forEach(cell => cell.style.display = '');
            });
        };
        window.renderApp = function() {
            const selectedMonth = document.getElementById('view-month').value;
            const monthTransactions = transactions.filter(t => t.date.startsWith(selectedMonth));
            const monthSalaries = salaries.filter(s => s.date.startsWith(selectedMonth));

            let monthIncome = 0;
            let monthExpenses = 0;

            monthTransactions.forEach(t => {
                const isIncome = t.category === 'Boutique Sale' || t.category === 'Other Income';
                if(isIncome) monthIncome += t.amount; else monthExpenses += t.amount;
            });

            monthSalaries.forEach(s => { monthExpenses += s.amount; });

            document.getElementById('total-income').innerText = formatMoney(monthIncome);
            document.getElementById('total-expenses').innerText = formatMoney(monthExpenses);
            const net = monthIncome - monthExpenses;
            const netElement = document.getElementById('net-balance');
            netElement.innerText = formatMoney(net);
            netElement.style.color = net >= 0 ? '#2e7d32' : '#c62828';
        };

        onSnapshot(collection(db, "transactions"), (snapshot) => {
            transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.renderApp();
        });

        onSnapshot(collection(db, "salaries"), (snapshot) => {
            salaries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.renderApp();
        });
    </script>
</body>
</html>
