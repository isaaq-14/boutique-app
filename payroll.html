<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll | Lumière Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<nav class="top-nav">
    <div class="nav-brand">MUGGUN BOUTIQUE</div>
    <div class="nav-links">
        <a href="index.html" class="nav-btn">Dashboard</a>
        <a href="masters.html" class="nav-btn">Master Data</a>
        <a href="transactions.html" class="nav-btn">Financials</a>
        <a href="payroll.html" class="nav-btn">Payroll</a>
    </div>
</nav>

    <div class="container">
        <div class="controls-header no-print">
            <div class="month-selector">
                <label for="view-month" style="margin: 0;">Viewing Month:</label>
                <input type="month" id="view-month" onchange="renderApp()">
            </div>
            <button class="btn-export" onclick="downloadPDF()">Download .PDF Report</button>
        </div>

        <h2 class="page-title">Employee Payroll</h2>
        <div class="split-grid">
            <div class="no-print">
                <div class="card">
                    <h2 id="s-form-title">Log Salary Payment</h2>
                    <div class="form-group">
                        <label>Date Paid</label>
                        <input type="date" id="s-date">
                    </div>
                    <div class="form-group">
                        <label>Worker Name</label>
                        <input type="text" id="s-name" placeholder="E.g., Sarah">
                    </div>
                    <div class="form-group">
                        <label>Monthly Salary (₹)</label>
                        <input type="number" id="s-amount" placeholder="0.00">
                    </div>
                    <div class="btn-group">
                        <button id="btn-save-salary" onclick="saveSalary()">Log Salary Expense</button>
                        <button id="btn-cancel-salary" class="btn-secondary" style="display: none;" onclick="cancelEditSalary()">Cancel</button>
                    </div>
                </div>
            </div>
            <div>
                <div class="card">
                    <h2>Salary History</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Date Paid</th>
                                <th>Worker</th>
                                <th>Amount Paid</th>
                                <th class="action-cell no-print">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="salary-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDAg0bLMj4hUsZ5PGGDqKyj5KwAQmMcNw",
            authDomain: "boutique-app-d2693.firebaseapp.com",
            projectId: "boutique-app-d2693",
            storageBucket: "boutique-app-d2693.firebasestorage.app",
            messagingSenderId: "762532423429",
            appId: "1:762532423429:web:0b849c205deb831f71796c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const salariesRef = collection(db, "salaries");

        let salaries = [];
        let editingSalaryId = null;

        const formatMoney = (amount) => '₹' + amount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

        const today = new Date();
        document.getElementById('view-month').value = today.toISOString().slice(0, 7);
        document.getElementById('s-date').value = today.toISOString().slice(0, 10);
        // --- PDF EXPORT ENGINE ---
        // --- PDF EXPORT ENGINE ---
        window.downloadPDF = function() {
            // 1. Turn on "PDF Mode" (Hides the forms, buttons, and stretches the tables)
            document.body.classList.add('pdf-export-mode');

            // 2. Select the area of the page we want to capture
            const element = document.querySelector('.container');
            const currentMonth = document.getElementById('view-month').value;

            // 3. Set the PDF quality and formatting rules
            const opt = {
                margin:       0.5,
                filename:     `Lumiere_Financial_Report_${currentMonth}.pdf`,
                image:        { type: 'jpeg', quality: 1 }, 
                html2canvas:  { scale: 2, useCORS: true },  
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // 4. Generate and download the PDF!
            html2pdf().set(opt).from(element).save().then(() => {
                // 5. Instantly turn off "PDF Mode" to return the screen to normal
                document.body.classList.remove('pdf-export-mode');
            });
        };
        window.renderApp = function() {
            const selectedMonth = document.getElementById('view-month').value;
            const monthSalaries = salaries.filter(s => s.date.startsWith(selectedMonth));

            const sTable = document.getElementById('salary-list');
            sTable.innerHTML = '';
            if(monthSalaries.length === 0) {
                sTable.innerHTML = '<tr><td colspan="4" class="empty-state">No salaries logged for this month.</td></tr>';
            } else {
                monthSalaries.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(s => {
                    sTable.innerHTML += `
                        <tr>
                            <td>${formatDate(s.date)}</td>
                            <td><strong>${s.name}</strong></td>
                            <td class="amount-neg">-${formatMoney(s.amount)}</td>
                            <td class="action-cell no-print">
                                <button class="action-link" onclick="editSalary('${s.id}')">Edit</button>
                                <button class="action-link danger" onclick="deleteSalary('${s.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            }
        };

        onSnapshot(salariesRef, (snapshot) => {
            salaries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.renderApp();
        });

        window.saveSalary = async function() {
            const date = document.getElementById('s-date').value;
            const name = document.getElementById('s-name').value;
            const amount = parseFloat(document.getElementById('s-amount').value);
            
            if (!date || !name || isNaN(amount)) return alert("Please fill out all fields.");
            
            if (editingSalaryId) {
                await updateDoc(doc(db, "salaries", editingSalaryId), { date, name, amount });
                window.cancelEditSalary();
            } else {
                await addDoc(salariesRef, { date, name, amount });
                document.getElementById('s-name').value = '';
                document.getElementById('s-amount').value = '';
            }
        };

        window.editSalary = function(id) {
            const s = salaries.find(x => x.id === id);
            if(!s) return;
            document.getElementById('s-date').value = s.date;
            document.getElementById('s-name').value = s.name;
            document.getElementById('s-amount').value = s.amount;
            editingSalaryId = id;
            document.getElementById('s-form-title').innerText = "Update Salary";
            document.getElementById('btn-save-salary').innerText = "Update";
            document.getElementById('btn-cancel-salary').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEditSalary = function() {
            editingSalaryId = null;
            document.getElementById('s-name').value = '';
            document.getElementById('s-amount').value = '';
            document.getElementById('s-form-title').innerText = "Log Salary Payment";
            document.getElementById('btn-save-salary').innerText = "Log Salary Expense";
            document.getElementById('btn-cancel-salary').style.display = "none";
        };

        window.deleteSalary = async function(id) {
            if(confirm("Delete this salary record?")) await deleteDoc(doc(db, "salaries", id));
        };
    </script>
</body>
</html>
